# Content Provenance and Rights Manifest
#
# This file documents the source, license, and redistribution status of
# all non-code assets in this repository. The MIT license (see LICENSE)
# applies to CODE only — scripts, simulations, and pipeline logic.
# Data assets have their own licensing as documented below.
#
# Machine-readable format: YAML. Per-asset-class entries.
# See also: LICENSE (MIT, code only).

