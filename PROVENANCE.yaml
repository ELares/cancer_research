    Generated outputs (manuscript, figures, simulation results) cite
    textbook sections for parameter provenance (e.g., "Anatomy &
    Physiology 2e, Ch.22.4") but do not reproduce copyrighted text or
    figures verbatim. Under CC BY 4.0, derivative works require
    attribution but are not otherwise restricted. Numerical parameter
    values (facts) are not copyrightable. If any future content directly
    reproduces a textbook figure or extended quote, CC BY attribution
    must be added to that specific element.

corpus:
  description: >
    4,830 full-text cancer research articles stored as processed
    markdown files (YAML frontmatter + extracted text) in corpus/by-pmid/.
    Sourced from PubMed via scripts/fetch_articles.py.
  total_articles: 4830
  open_access:
    count: 4769
    fraction: 0.987
    note: >
      98.7% of articles are classified as Open Access per OpenAlex
      metadata. OA articles are typically CC BY, CC BY-NC, or equivalent
      licenses that permit redistribution with attribution.
  non_open_access:
    count: 61
    note: >
      61 articles have full text stored but are NOT confirmed as Open
      Access. These may be copyrighted by their publishers. Redistribution
      of full-text copyrighted articles without publisher permission may
      violate copyright. Follow-up action: verify each article's actual
      OA status (OpenAlex has ~5% error rate) and downgrade confirmed
      non-OA articles to abstract-only storage.
  abstract_archive:
    count: 5585
    note: >
      Abstract-only records in corpus/abstracts/by-pmid/. Bibliographic
      metadata and abstracts are generally not copyrightable under US law
      (Feist Publications v. Rural Telephone Service).

news:
  description: >
    51 news articles fetched by scripts/fetch_news.py from public
    RSS feeds and web pages. Stored as extracted text with metadata
    in news/by-source/.
  sources:
    - "who.int (Tier 1 — institutional)"
    - "sciencedaily.com (Tier 2 — science journalism)"
    - "cancer.org (Tier 3 — advocacy/research)"
  note: >
    News content is stored for research and commentary purposes.
    Individual article redistribution rights depend on each source's
    terms of use. ScienceDaily content summarizes published research
    and is typically available for non-commercial educational use.

calibration_data:
  description: >
    Public datasets used to calibrate / validate the ferroptosis-core simulation
    suite (#330 kill switch, #333 spheroid structure, #334 tumor-PK). Fetched by
    scripts/fetch_calibration_data.py and scripts/validate_spheroid_structure.py;
    the #334 PK targets are transcribed published table values (no raw download).
    Only small DERIVATIVES (dose-response fits; size-binned structure summary; PK
    summary metrics) are committed; the full raw downloads are NOT redistributed.
  assets:
    - name: "Browning 2021 spheroid confocal structure (derived summary)"
      file: "analysis/calibration/spheroid-structure-validation.json"
      source: "Browning et al. 2021 eLife, Data/AllConfocalData.csv"
      url: "https://github.com/ap-browning/Spheroids (raw master/Data/AllConfocalData.csv); Zenodo 10.5281/zenodo.5121093"
      primary_refs:
        - "Browning et al. 2021 eLife, PMID 34842141, DOI 10.7554/eLife.73020"
      license: "Open (eLife CC BY 4.0 article + public author data repository)"
      redistributable: true
      attribution: "Spheroid confocal structure data, Browning et al. 2021 (ap-browning/Spheroids)"
      note: >
        Committed file is a size-binned summary (phi/eta boundary fractions vs outer
        radius) derived from the 994-spheroid confocal dataset, used to validate the
        spheroid module's fixed zone thresholds (#333). The raw CSV is not committed;
        regenerate with scripts/validate_spheroid_structure.py.
    - name: "CTRPv2 ferroptosis-inducer dose-response (derived)"
      file: "analysis/calibration/ctrpv2_ferroptosis_curves.csv"
      source: "CTRPv2 (Cancer Therapeutics Response Portal v2), via DepMap-redistributed 'Harmonized CTD^2 25Q2'"
      upstream_file: "CTRPResponseCurves.csv (md5 36115a26e2cabab33906793ba04c47f8)"
      url: "https://depmap.org/portal/api/download/files"
      primary_refs:
        - "Seashore-Ludlow et al. 2015 Cancer Discov, PMID 26181016"
        - "Rees et al. 2016 Nat Chem Biol, PMID 26656090"
      license: "CC BY 4.0 (DepMap redistribution); underlying CTRPv2/CTD2 data is publicly released by the Broad Institute"
      redistributable: true
      attribution: "CTRPv2 (Broad Institute CTD^2), redistributed via DepMap"
      note: >
        Committed file is a filtered derivative (5 ferroptosis inducers, 3,021
        per-cell-line logistic fits) of the public CTRPv2 release. The raw 45 MB
        CTRPResponseCurves.csv is not committed; regenerate with
        scripts/fetch_calibration_data.py. Used as the #330 calibration target.
    - name: "Ferroptosis-inducer pharmacokinetics (transcribed summary)"
      file: "analysis/calibration/pk_measured_data.csv"
      source: "Published PK tables: IKE (Zhang 2019, Cell Chem Biol) + sorafenib popPK (Jain 2011, Br J Clin Pharmacol)"
      url: "https://pubmed.ncbi.nlm.nih.gov/30799221/ (IKE, PMC6525071); https://pubmed.ncbi.nlm.nih.gov/21392074/ (sorafenib, PMC3162659)"
      primary_refs:
        - "Zhang et al. 2019 Cell Chem Biol, PMID 30799221, DOI 10.1016/j.chembiol.2019.01.008"
        - "Jain et al. 2011 Br J Clin Pharmacol, PMID 21392074, DOI 10.1111/j.1365-2125.2011.03963.x"
      license: "Published summary parameters (facts/data, not creative expression); cited to source"
      redistributable: true
      attribution: "IKE PK (Zhang et al. 2019); sorafenib popPK (Jain et al. 2011)"
      note: >
        Committed file holds transcribed published summary PK metrics (NCA Tmax/Cmax/
        terminal-t1/2/AUC for IKE plasma+tumor; popPK CL/V/transit/EHC for sorafenib),
        not digitized curves or raw downloads. Used as the #334 tumor-PK anchoring
        target (see calibration-targets-pk.md). The per-timepoint IKE curve lives in
        the cited open-access supplement; only the summary metrics are committed.
    - name: "Drug-penetration measured metrics (transcribed summary)"
      file: "analysis/calibration/penetration_measured_data.csv"
      source: "Published penetration tables: Primeau 2005 + Tannock 2002 (doxorubicin half-distances) + Minchinton & Tannock 2006 review range"
      url: "https://pubmed.ncbi.nlm.nih.gov/16361566/ (Primeau 2005); https://pubmed.ncbi.nlm.nih.gov/11895922/ (Tannock 2002); https://pubmed.ncbi.nlm.nih.gov/16862189/ (Minchinton 2006)"
      primary_refs:
        - "Primeau et al. 2005 Clin Cancer Res, PMID 16361566, DOI 10.1158/1078-0432.CCR-05-1664"
        - "Tannock et al. 2002 Clin Cancer Res, PMID 11895922"
        - "Minchinton & Tannock 2006 Nat Rev Cancer, PMID 16862189, DOI 10.1038/nrc1893"
      license: "Published summary metrics (facts/data, not creative expression); cited to source"
      redistributable: true
      attribution: "Doxorubicin penetration metrics (Primeau 2005; Tannock 2002; Minchinton & Tannock 2006)"
      note: >
        Committed file holds transcribed published penetration summary metrics
        (doxorubicin half-distances / penetration-depth ranges in microns, exponential-
        form flags, plus qualitative slow/surface-limited contrasts for platinum and
        paclitaxel), NOT digitized curve points. Used as the #335 Krogh-penetration
        validation target (see penetration-validation.md). No raw image digitization is
        committed; the validation uses the reported summary half-distances.
