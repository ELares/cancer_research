# Figure Traceability Index
#
# Maps every figure file in article/figures/ to its generator,
# input data, and manuscript position. Machine-readable companion
# to the figs dict in scripts/generate_latex.py (lines 176-196).
#
# Fields:
#   manuscript_figure: number in the compiled manuscript (1-19), or null
#   filename: basename without extension (both PDF and PNG exist)
#   generator:
#     script: path relative to repo root (or null for orphans)
#     function: function name in that script (or null)
#   inputs: list of input data paths relative to repo root
#   type: corpus-derived | simulation | conceptual | unknown
#   status: manuscript | supplementary | orphan
#   note: optional context for non-obvious items
#
# When adding a new figure, add an entry here AND in the figs dict
# in scripts/generate_latex.py. The test in tests/test_figure_traceability.py
# validates that this file stays in sync with disk.

figures:
  # ── Manuscript figures (1-19) ──────────────────────────────────

