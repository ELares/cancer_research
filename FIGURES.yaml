      function: fig8_simulation_by_treatment
    inputs:
      - simulations/output/spatial/depth_kill_curves.csv
    type: simulation
    status: manuscript
    note: >
      Tier-1 depth-kill figure (#285): PDT (light, Beer-Lambert) collapses
      with depth, SDT (ultrasound, acoustic) penetrates to centimeters, RSL3
      (systemic drug) is a depth-independent uniform baseline. Panel (a) is
      observed kill vs depth; panel (b) is the driving penetration physics
      computed from the model's own equations (physics.rs defaults). The
      depth-profile physics is high-confidence; absolute kill % is
      uncalibrated and SDT is modeled O2-independent (manuscript section 7.1).
      The CSV input is gitignored; regenerate with
      `cargo run --release -p sim-spatial`, then `python scripts/generate_figures.py`.
      Replaces the prior externally-post-processed version with a tracked,
      reproducible generator.

