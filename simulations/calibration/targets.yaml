# Calibration targets linking simulation observables to published data.
#
# Each target specifies what the simulation should produce given its current
# parameters, what published data says the value should be, and how much
# tolerance is acceptable.  The evaluate script reads these targets and
# compares against existing simulation outputs.
#
# target_type distinguishes two categories:
#   - "calibration": the target value comes from independent experimental
#     data and validates that the model reproduces a measured outcome.
#   - "self-consistency": the target value follows from the model's own
#     hard-coded physics/parameter assumptions and only verifies that the
#     binary reproduces those assumptions correctly. Useful for regression
#     testing, but does not constitute independent validation.

targets:
  - id: persister_rsl3_death_rate
    target_type: calibration
    description: "Persister (FSP1-low) cell death rate under RSL3 in 2D culture"
    source_pmid: "41481741"
    source_description: "Higuchi et al., Science Advances 2026 — FSP1 and HDACs suppress persister ferroptosis"
    binary: sim-original
    output_file: "simulation_results.json"
    extraction:
      phenotype_contains: "Persister"
      phenotype_excludes: "NRF2"
      treatment: "RSL3"
      field: "death_rate"
    target_value: 0.425
    tolerance: 0.10
    confidence: "medium"
    note: "Dose-response data extrapolated from IC50 curves; exact match depends on assumed RSL3 concentration"
    parameters_affected:
      - fsp1_rate
      - rsl3_gpx4_inhib
      - death_threshold

  - id: pdt_kill_at_9mm
    target_type: self-consistency
    description: "PDT kill rate at 9mm tissue depth"
    source_description: "Jacques SL, Phys Med Biol 2013 — tissue optical properties at 630nm. This target verifies that the spatial simulation reproduces the expected exponential attenuation from the hard-coded pdt_mu_eff parameter. It is a self-consistency check, not an independent calibration."
    binary: sim-spatial
    output_file: "spatial/depth_kill_curves.csv"
    extraction:
      treatment: "PDT"
      depth_um_range: [8500, 9500]
      field: "death_rate"
      aggregation: "mean"
    target_value: 0.005
    tolerance: 0.015
    confidence: "high"
    note: "Self-consistency: verifies Beer-Lambert attenuation from hard-coded µ_eff = 0.31/mm"
    parameters_affected:
      - pdt_mu_eff

  - id: rsl3_window_closure_72h
    target_type: calibration
    description: "RSL3 death rate drops below 10% by 72 hours post-treatment"
    source_description: "GPX4 transcriptional recovery kinetics — consensus from multiple ferroptosis studies"
    binary: sim-window
    output_file: "window/vulnerability_window.csv"
    extraction:
      treatment: "RSL3"
      timepoint_hours: 72.0
      field: "death_rate"
    target_comparator: "<"
    target_value: 0.10
    tolerance: 0.05
    confidence: "medium"
    note: "Recovery rate inferred from transcriptional kinetics; no single paper provides exact time-course"
    parameters_affected:
      - gpx4_half_recovery_days

  - id: invivo_mufa_protection_factor
    target_type: calibration
    description: "In-vivo MUFA provides substantial protection against RSL3 for persisters"
    source_description: "Composite model target anchored on PUBLISHED evidence for the SCD1/MUFA ferroptosis-protection axis (the prior unpublished/no-PMID Dixon-Park reference and its unsourced 40-60% PUFA-displacement figure were removed, #537). Tesfay et al., Cancer Res 2019 (PMID 31270077) showed ~3-5x ferroptosis resensitization upon SCD1 inhibition; Sen et al., Cancer Res 2025 (PMID 40198901, 'SCD1 Inhibition Blocks the AKT-NRF2-SLC7A11 Pathway to Induce Lipid Metabolism Remodeling') independently supports SCD1-driven lipid remodeling sensitizing to ferroptosis. The 18.6x protection factor is a model-derived composite, NOT a single published measurement: the DIRECTION (MUFA enrichment protects persisters from RSL3) is anchored, the magnitude is not."
    binary: sim-invivo
    output_file: "invivo/invivo_comparison.json"
    extraction:
      contexts: ["2d", "invivo"]
      phenotype_contains: "Persister"
      phenotype_excludes: "NRF2"
      treatment: "RSL3"
      derived: "death_rate_2d / death_rate_invivo"
    target_value: 18.6
    tolerance: 5.0
    confidence: "low"
    note: "Model-derived, NOT a published measurement. Tesfay 2019 (PMID 31270077) provides the SCD1-resensitization DIRECTION (~3-5x published); the 0.50 MUFA cap and the resulting 18.6x are uncalibrated model parameters whose magnitude EXCEEDS the published resensitization and has no verifiable source (the prior unpublished/no-PMID Dixon-Park 40-60% PUFA-displacement figure was removed, #537). Only the direction is anchored."
    parameters_affected:
      - scd_mufa_rate
      - scd_mufa_max
      - initial_mufa_protection

  - id: sdt_penetration_1cm
    target_type: self-consistency
    description: "SDT maintains >84% kill rate through 1cm tissue depth"
    source_description: "Cobbold RSC, Foundations of Biomedical Ultrasound 2007 — soft tissue attenuation. This target verifies that the spatial simulation reproduces the expected acoustic attenuation from the hard-coded sdt_alpha parameter. It is a self-consistency check, not an independent calibration."
    binary: sim-spatial
    output_file: "spatial/depth_kill_curves.csv"
    extraction:
      treatment: "SDT"
      depth_um_range: [0, 10000]
      field: "death_rate"
      aggregation: "min"
    target_comparator: ">"
    target_value: 0.84
    tolerance: 0.10
    confidence: "high"
    note: "Self-consistency: verifies acoustic attenuation from hard-coded α = 0.7 dB/cm/MHz"
    parameters_affected:
      - sdt_alpha
      - sdt_freq_mhz

  # =========================================================================
  # 3D Spheroid Validation Targets (#196)
  #
  # These three targets are SELF-CONSISTENCY — they regression-guard the
  # Q1–Q3 findings reported in `3d_validation_report.md`. They are not
  # independent experimental validation. To upgrade any of these to
  # `target_type: calibration`, add a `source_pmid` field and replace
  # the heuristic `target_value` with the measured-from-literature value.
  #
  # All three depend on sim-tme-3d's `output/tme-3d/summary.json` having
  # been refreshed (PR #219, v0.1.0 schema). Pre-measured values come from
  # the canonical fixed-seed (SEED=42) production run at 60³ × 180 steps.
  # =========================================================================

  - id: 3d_rsl3_o2_collapse_ratio
    target_type: self-consistency
    description: "RSL3 at λ=120 µm: hypoxic-zone kill rate should be ≤ 50% of normoxic-zone kill rate (Q1 finding)"
    source_description: "Q1 from 3d_validation_report.md. The O2-gradient model predicts that RSL3 (an O2-dependent ferroptosis inducer) loses efficacy in the deep hypoxic core. Sim-tme-3d's current run produces ratio ≈ 0.016 (98% collapse), far below the 0.5 self-consistency threshold. Upgrade to `calibration` when paired against pimonidazole-stained spheroid kill data (Vaupel 1989 cited in oxygen.rs)."
    binary: sim-tme-3d
    output_file: "tme-3d/summary.json"
    extraction:
      metric: "rsl3_o2_collapse_ratio"
    target_comparator: "<"
    target_value: 0.5
    tolerance: 0.5
    confidence: "medium"
    note: "Self-consistency. The 0.5 threshold reserves a 30× margin against the observed ~0.016, so this catches catastrophic regressions (RSL3 working unchanged in hypoxia) without being noise-sensitive."
    parameters_affected:
      - o2_lambda_um
      - basal_ros
      - rsl3_gpx4_inhib

  - id: 3d_immune_sdt_dominates
    target_type: self-consistency
    description: "At λ=120 immune-on: SDT immune-kills should be > 3× RSL3 immune-kills (Q2 finding — the manuscript-keystone 104:1 → 4:1 reduction in 3D)"
    source_description: "Q2 from 3d_validation_report.md. The DAMP-density-driven immune coupling model predicts SDT (dense kill → high DAMP → high DC/T-cell activation) outproduces RSL3 immune kills. Sim-tme-3d produces ratio ≈ 4.0; sim-tme's 2D produces 104.2. LITERATURE ASSESSMENT (#288, every PMID verified against PubMed): a direct shared-denominator measurement of this ratio does NOT exist, and the previously-named 'Nguyen 2019' reference is not a real applicable study (it was a phantom citation — removed). The exact ratio is therefore not extractable and this stays self-consistency. BUT its DIRECTION and single-digit MAGNITUDE-CLASS are now literature-anchored: the RSL3/GPX4-inhibitor denominator is non- to weakly-immunogenic (Wiernicki 2022 PMID 35760796 — 0% vaccination protection; genuine caveat: EARLY ferroptosis CAN be immunogenic, Efimova 2020 PMID 33188036, so the denominator is timing-dependent, not uniformly zero), while SDT drives DC maturation + CD8 infiltration + antitumor immunity over controls (Wang 2021 PMID 34669472; Luo 2022 PMID 35568916; pancreatic-spheroid SDT-ICD: Foglietta 2024 PMID 38232641; the precise fold-changes are figure-level, not abstract-level). The 2D 104:1 over-extrapolates for a model-internal reason: the immune layer's saturating Michaelis-Menten DAMP->activation (Kd=50) is driven deep into saturation by the dense 2D kill field, whereas 3D volumetric DAMP dilution keeps it sub-saturating, giving the more realistic ~4:1. Net: direction calibrated to literature; exact magnitude not. See CALIBRATION_STATUS.md."
    binary: sim-tme-3d
    output_file: "tme-3d/summary.json"
    extraction:
      metric: "immune_sdt_rsl3_ratio"
    target_comparator: ">"
    target_value: 3.0
    tolerance: 1.0
    confidence: "medium"
    note: "Self-consistency for the VALUE (threshold 3.0 is below the observed ~4.0 with 25% margin; catches a regression where the immune block silently no-ops or DAMP diffusion drops below the kill-threshold). The DIRECTION (ratio > 1, SDT dominates) and single-digit magnitude-class are literature-anchored (#288); a precise calibrated value is not available because no published study runs SDT and an RSL3-only arm against a shared immune readout."
    parameters_affected:
      - damp_diffusion_fraction
      - damp_clearance_rate
      - dc_activation_kd
      - immune_kill_rate
      - pd1_brake

  - id: 3d_stromal_boundary_shielding
    target_type: self-consistency
    description: "At λ=120 immune-on RSL3: stromal-on boundary kill rate should be ≤ 70% of no-stromal boundary kill rate (Q3 finding — CAF shielding ≥ 30%)"
    source_description: "Q3 from 3d_validation_report.md. CAF-mediated GSH/MUFA boost at the boundary reduces RSL3 efficacy at the spheroid edge. Sim-tme-3d's current run produces ratio ≈ 0.485 (51.5% shielding), nearly identical to 2D's 50.0% — surprising-but-consistent finding that per-cell shielding is geometry-independent. Upgrade to `calibration` against published CAF-coculture spheroid data (PMID 34373744 cited in stromal.rs)."
    binary: sim-tme-3d
    output_file: "tme-3d/summary.json"
    extraction:
      metric: "stromal_shielding_ratio"
    target_comparator: "<"
    target_value: 0.7
    tolerance: 0.3
    confidence: "medium"
    note: "Self-consistency. Threshold 0.7 (i.e., ≥30% shielding) is well above observed ~0.485 (51.5% shielding). Catches regressions where stromal protection silently no-ops (gsh_boost or mufa_boost ineffective)."
    parameters_affected:
      - gsh_boost_per_step
      - gsh_boost_cap
      - mufa_boost_per_step
      - mufa_boost_cap
