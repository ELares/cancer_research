name: Build & Publish Python Wheels

on:
  workflow_dispatch:
    inputs:
      publish_to_pypi:
        description: 'Publish to real PyPI (false = TestPyPI only)'
        required: true
        type: boolean
        default: false
  push:
    tags:
      - 'v*-python'

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,  manylinux: auto }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu, manylinux: auto }
          - { os: macos-13,       target: x86_64-apple-darwin }
          - { os: macos-14,       target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: simulations

      # setup-python only needed for macOS/Windows (host builds).
      # Linux manylinux builds use a Docker container with Python built in.
      - uses: actions/setup-python@v6
        if: runner.os != 'Linux'
        with:
          python-version: '3.12'

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --strip --out dist --manifest-path simulations/ferroptosis-python/Cargo.toml
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: simulations

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path simulations/ferroptosis-python/Cargo.toml

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: dist/*.tar.gz

  test-wheels:
    name: Test wheel (${{ matrix.os }})
    needs: build-wheels
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: macos-13,       target: x86_64-apple-darwin }
          - { os: macos-14,       target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: simulations

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: actions/download-artifact@v8
        with:
          name: wheels-${{ matrix.target }}
          path: dist

      - name: Install wheel and run tests
        shell: bash
        run: |
          pip install dist/*.whl
          pip install pytest
          pytest simulations/ferroptosis-python/test_bindings.py -v

  publish-testpypi:
    name: Publish to TestPyPI
    needs: [test-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && !inputs.publish_to_pypi
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          packages-dir: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: [test-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_to_pypi)
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/
