name: Rust Tests

on:
  push:
    branches: [main]
    paths:
      # Build-affecting inputs only — a data/doc-only edit under simulations/
      # (targets.yaml, *.md, summary/results *.json, expected_summary.sha256)
      # has no effect on `cargo test --workspace` yet used to trigger the full
      # ~25-min suite (#564). Rust sources (incl. build.rs) + crate manifests:
      - 'simulations/**/*.rs'
      - 'simulations/Cargo.toml'
      - 'simulations/**/Cargo.toml'
      - 'simulations/Cargo.lock'
      # Toolchain + link config (the #521 macOS pyo3 link wall lives here):
      - 'simulations/rust-toolchain.toml'
      - 'simulations/.cargo/**'
      # C-FFI ABI-verify inputs: the `test` job compiles ferroptosis-ffi/tests/
      # test_ffi.c against the cdylib and git-diff-guards the cbindgen-generated
      # ferroptosis.h, so the C harness, the committed header, and the cbindgen
      # config are all cargo-test inputs:
      - 'simulations/**/*.c'
      - 'simulations/**/*.h'
      - 'simulations/ferroptosis-ffi/cbindgen.toml'
      # #550: the bindings-macos job builds ferroptosis-python via maturin and
      # runs test_bindings.py, so its packaging config + binding tests are also
      # cargo CI inputs (the crate's *.rs / Cargo.toml + ferroptosis-core are
      # already matched above):
      - 'simulations/ferroptosis-python/pyproject.toml'
      - 'simulations/ferroptosis-python/test_bindings.py'
      - '.github/workflows/cargo-test.yml'
  pull_request:
    paths:
      # Build-affecting inputs only — a data/doc-only edit under simulations/
      # (targets.yaml, *.md, summary/results *.json, expected_summary.sha256)
      # has no effect on `cargo test --workspace` yet used to trigger the full
      # ~25-min suite (#564). Rust sources (incl. build.rs) + crate manifests:
      - 'simulations/**/*.rs'
      - 'simulations/Cargo.toml'
      - 'simulations/**/Cargo.toml'
      - 'simulations/Cargo.lock'
      # Toolchain + link config (the #521 macOS pyo3 link wall lives here):
      - 'simulations/rust-toolchain.toml'
      - 'simulations/.cargo/**'
      # C-FFI ABI-verify inputs: the `test` job compiles ferroptosis-ffi/tests/
      # test_ffi.c against the cdylib and git-diff-guards the cbindgen-generated
      # ferroptosis.h, so the C harness, the committed header, and the cbindgen
      # config are all cargo-test inputs:
      - 'simulations/**/*.c'
      - 'simulations/**/*.h'
      - 'simulations/ferroptosis-ffi/cbindgen.toml'
      # #550: the bindings-macos job builds ferroptosis-python via maturin and
      # runs test_bindings.py, so its packaging config + binding tests are also
      # cargo CI inputs (the crate's *.rs / Cargo.toml + ferroptosis-core are
      # already matched above):
      - 'simulations/ferroptosis-python/pyproject.toml'
      - 'simulations/ferroptosis-python/test_bindings.py'
      - '.github/workflows/cargo-test.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: simulations

      - name: Run tests (workspace minus the slow sim-tme-3d suite)
        # #549: sim-tme-3d's heavy 3D spatial A/B integration tests dominate the
        # Rust suite (~16 min of the serial ~25). They run in the parallel
        # `test-sim-tme-3d` job below, so the workspace test no longer waits on
        # them serially — wall-clock drops from the sum toward ~max(this job,
        # sim-tme-3d). `--exclude` skips only sim-tme-3d's own test targets;
        # every other crate (including ferroptosis-core, which sim-tme-3d depends
        # on, and which is recompiled but whose tests run only here) still runs.
        working-directory: simulations
        run: cargo test --workspace --exclude sim-tme-3d

      - name: Verify C-FFI ABI (PhysiCell integration boundary)
        # `cargo test` exercises the Rust side but never links the extern "C"
        # surface from C, so the documented PhysiCell integration point was
        # unverified per-PR (#295 item 4). Build the cdylib, then compile the C
        # harness against it and gate on its exit code (the harness returns
        # non-zero on a NULL handle or an out-of-range kill rate). A Rust ABI
        # change that breaks the C consumer surfaces as a cc compile/link error.
        #
        # build.rs regenerates the cbindgen header in place on every build, so
        # the `git diff --exit-code` guards the COMMITTED header against drift:
        # if a Rust ABI change left the tracked ferroptosis.h stale, the build
        # rewrites it and this fails (regenerate + commit the header to fix).
        # `cc` ships with ubuntu-latest's build-essential.
        working-directory: simulations
        run: |
          cargo build --release -p ferroptosis-ffi
          git diff --exit-code -- ferroptosis-ffi/include/ferroptosis.h
          cc -o "$RUNNER_TEMP/test_ffi" ferroptosis-ffi/tests/test_ffi.c \
            -L target/release -lferroptosis_ffi
          LD_LIBRARY_PATH=target/release "$RUNNER_TEMP/test_ffi"

  test-sim-tme-3d:
    # #549: the slow half of the Rust suite, partitioned out of `test` so it runs
    # in parallel rather than serially. sim-tme-3d carries the heavy 3D spatial
    # A/B integration tests (full-grid runs) — ~16 min on their own — so isolating
    # them cuts the Rust-CI wall-clock from the serial ~25 min toward the
    # sim-tme-3d floor. Same ubuntu-latest + @stable toolchain + workspace cache
    # as `test` (rust-cache keys per-job, so the two caches don't collide). This
    # runs sim-tme-3d's unit + integration + doc tests; `test` runs everything
    # else via `--exclude sim-tme-3d`, so together they cover the full workspace.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: simulations

      - name: Run the sim-tme-3d test suite
        working-directory: simulations
        run: cargo test -p sim-tme-3d

  build-macos:
    # Guard the documented first build step on Apple Silicon. The Ubuntu `test`
    # job links the `ferroptosis-python` cdylib fine and so never caught #521,
    # where `cargo build --release` failed on macOS because the pyo3
    # extension-module crate needs `-undefined dynamic_lookup` (now supplied by
    # simulations/.cargo/config.toml). `macos-latest` is Apple Silicon — the
    # exact platform that failed. Build-only (the `test` job runs the suite).
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: simulations

      - name: Build the full workspace (Apple Silicon link path)
        working-directory: simulations
        run: cargo build --release --workspace

  bindings-macos:
    # #550: build the ferroptosis-python pyo3 bindings via maturin (the actual
    # Python packaging path) on Apple Silicon AND run the binding tests. The
    # build-macos job only does `cargo build` — it links the cdylib but never
    # exercises maturin's wheel build + the extension-module import, the half of
    # the #521 macOS pyo3 link surface that cargo never reaches (interpreter
    # link, wheel tags, module naming). This builds the wheel with maturin and
    # runs test_bindings.py against the installed module, so a macOS-specific
    # maturin/pyo3 regression fails the PR — mirroring how `test` builds AND runs
    # the C-FFI harness rather than only compiling it.
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache Cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: simulations

      - name: Build bindings with maturin and run the binding tests
        working-directory: simulations/ferroptosis-python
        # maturin develop must run inside a virtualenv; it builds the wheel and
        # installs `ferroptosis_core` editable into it, then test_bindings.py
        # (stdlib-only, self-contained __main__ runner) imports and exercises it.
        run: |
          python -m venv "$RUNNER_TEMP/bindings-venv"
          source "$RUNNER_TEMP/bindings-venv/bin/activate"
          # Pin maturin to the pyproject build-system range; `maturin develop`
          # (the CLI) does NOT read build-system.requires, so without this an
          # unpinned `--upgrade` could pull a future 2.x and silently break the
          # job — against the repo's pinned-deps convention (#550 review).
          python -m pip install --upgrade pip "maturin>=1.7,<2.0"
          maturin develop --release
          python test_bindings.py

  fmt:
    # Block PRs that introduce cargo fmt drift in the simulations
    # workspace. Runs in parallel with `test`; rustfmt-only — no build
    # cache needed.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install pinned Rust toolchain with rustfmt
        # Pin to the workspace toolchain in `simulations/rust-toolchain.toml`
        # rather than @stable. Cargo invocations from `simulations/`
        # honor the pin and would otherwise auto-download the pinned
        # channel *without* rustfmt, breaking the gate (PR #236 review).
        # Bumping the workspace pin requires bumping this version too.
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt

      - name: Check formatting
        working-directory: simulations
        run: cargo fmt --all --check
