name: Rust Tests

on:
  push:
    branches: [main]
    paths:
      # Build-affecting inputs only — a data/doc-only edit under simulations/
      # (targets.yaml, *.md, summary/results *.json, expected_summary.sha256)
      # has no effect on `cargo test --workspace` yet used to trigger the full
      # ~25-min suite (#564). Rust sources (incl. build.rs) + crate manifests:
      - 'simulations/**/*.rs'
      - 'simulations/Cargo.toml'
      - 'simulations/**/Cargo.toml'
      - 'simulations/Cargo.lock'
      # Toolchain + link config (the #521 macOS pyo3 link wall lives here):
      - 'simulations/rust-toolchain.toml'
      - 'simulations/.cargo/**'
      # C-FFI ABI-verify inputs: the `test` job compiles ferroptosis-ffi/tests/
      # test_ffi.c against the cdylib and git-diff-guards the cbindgen-generated
      # ferroptosis.h, so the C harness, the committed header, and the cbindgen
      # config are all cargo-test inputs:
      - 'simulations/**/*.c'
      - 'simulations/**/*.h'
      - 'simulations/ferroptosis-ffi/cbindgen.toml'
      - '.github/workflows/cargo-test.yml'
  pull_request:
    paths:
      # Build-affecting inputs only — a data/doc-only edit under simulations/
      # (targets.yaml, *.md, summary/results *.json, expected_summary.sha256)
      # has no effect on `cargo test --workspace` yet used to trigger the full
      # ~25-min suite (#564). Rust sources (incl. build.rs) + crate manifests:
      - 'simulations/**/*.rs'
      - 'simulations/Cargo.toml'
      - 'simulations/**/Cargo.toml'
      - 'simulations/Cargo.lock'
      # Toolchain + link config (the #521 macOS pyo3 link wall lives here):
      - 'simulations/rust-toolchain.toml'
      - 'simulations/.cargo/**'
      # C-FFI ABI-verify inputs: the `test` job compiles ferroptosis-ffi/tests/
      # test_ffi.c against the cdylib and git-diff-guards the cbindgen-generated
      # ferroptosis.h, so the C harness, the committed header, and the cbindgen
      # config are all cargo-test inputs:
      - 'simulations/**/*.c'
      - 'simulations/**/*.h'
      - 'simulations/ferroptosis-ffi/cbindgen.toml'
      - '.github/workflows/cargo-test.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: simulations

      - name: Run tests and compile all binaries
        working-directory: simulations
        run: cargo test --workspace

      - name: Verify C-FFI ABI (PhysiCell integration boundary)
        # `cargo test` exercises the Rust side but never links the extern "C"
        # surface from C, so the documented PhysiCell integration point was
        # unverified per-PR (#295 item 4). Build the cdylib, then compile the C
        # harness against it and gate on its exit code (the harness returns
        # non-zero on a NULL handle or an out-of-range kill rate). A Rust ABI
        # change that breaks the C consumer surfaces as a cc compile/link error.
        #
        # build.rs regenerates the cbindgen header in place on every build, so
        # the `git diff --exit-code` guards the COMMITTED header against drift:
        # if a Rust ABI change left the tracked ferroptosis.h stale, the build
        # rewrites it and this fails (regenerate + commit the header to fix).
        # `cc` ships with ubuntu-latest's build-essential.
        working-directory: simulations
        run: |
          cargo build --release -p ferroptosis-ffi
          git diff --exit-code -- ferroptosis-ffi/include/ferroptosis.h
          cc -o "$RUNNER_TEMP/test_ffi" ferroptosis-ffi/tests/test_ffi.c \
            -L target/release -lferroptosis_ffi
          LD_LIBRARY_PATH=target/release "$RUNNER_TEMP/test_ffi"

  build-macos:
    # Guard the documented first build step on Apple Silicon. The Ubuntu `test`
    # job links the `ferroptosis-python` cdylib fine and so never caught #521,
    # where `cargo build --release` failed on macOS because the pyo3
    # extension-module crate needs `-undefined dynamic_lookup` (now supplied by
    # simulations/.cargo/config.toml). `macos-latest` is Apple Silicon — the
    # exact platform that failed. Build-only (the `test` job runs the suite).
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: simulations

      - name: Build the full workspace (Apple Silicon link path)
        working-directory: simulations
        run: cargo build --release --workspace

  fmt:
    # Block PRs that introduce cargo fmt drift in the simulations
    # workspace. Runs in parallel with `test`; rustfmt-only — no build
    # cache needed.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install pinned Rust toolchain with rustfmt
        # Pin to the workspace toolchain in `simulations/rust-toolchain.toml`
        # rather than @stable. Cargo invocations from `simulations/`
        # honor the pin and would otherwise auto-download the pinned
        # channel *without* rustfmt, breaking the gate (PR #236 review).
        # Bumping the workspace pin requires bumping this version too.
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt

      - name: Check formatting
        working-directory: simulations
        run: cargo fmt --all --check
