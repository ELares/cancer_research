name: Build & Release PDF

on:
  push:
    branches: [main]
    paths:
      - 'article/**'
      - 'scripts/generate_latex.py'
      - '.github/workflows/release-pdf.yml'

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: false  # LFS files (books/) not needed for PDF compilation

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-science \
            texlive-bibtex-extra \
            biber \
            latexmk

      - name: Generate LaTeX from Markdown
        run: python3 scripts/generate_latex.py

      - name: Compile PDF (pdflatex, 2-pass)
        working-directory: article/drafts
        run: |
          # pdflatex exits NON-ZERO on RECOVERABLE errors (e.g. a missing glyph
          # for an unmapped Unicode char) even when it produces a complete PDF.
          # Don't let that alone fail the release — the "Verify PDF" step below is
          # the real gate (PDF exists, sane size, no FATAL error in the log). A
          # genuine break (Emergency stop / Fatal error) is caught there.
          pdflatex -interaction=nonstopmode v1.tex || true
          pdflatex -interaction=nonstopmode v1.tex || true

      - name: Verify PDF was generated
        working-directory: article/drafts
        run: |
          if [ ! -f v1.pdf ]; then
            echo "ERROR: PDF not generated"
            exit 1
          fi
          # A fatal/emergency LaTeX error truncates or omits the PDF — catch it
          # even though we tolerated pdflatex's exit code above.
          if grep -qE "Emergency stop|Fatal error occurred|No pages of output" v1.log; then
            echo "ERROR: pdflatex hit a fatal error:"
            grep -nE "Emergency stop|Fatal error occurred|No pages of output" v1.log || true
            exit 1
          fi
          # Sanity floor: the full manuscript PDF is ~1.7 MB / ~120 pages. A fatal
          # abort yields a far smaller (or absent) file. Gate on size (no extra dep).
          BYTES=$(wc -c < v1.pdf)
          echo "PDF size: $(du -h v1.pdf | cut -f1) (${BYTES} bytes)"
          echo "PDF pages: $(pdfinfo v1.pdf 2>/dev/null | grep Pages || echo 'unknown (pdfinfo unavailable)')"
          if [ "${BYTES}" -lt 500000 ]; then
            echo "ERROR: PDF is only ${BYTES} bytes (< 500 KB) — likely a truncated/failed build"
            exit 1
          fi
          # Surface any recovered Unicode errors so they get fixed even though they
          # no longer block the release (generate_latex.py map_greek should prevent them).
          if grep -q "Unicode character" v1.log; then
            echo "::warning::pdflatex recovered from Unicode-character errors (a glyph is unmapped in scripts/generate_latex.py):"
            grep -n "Unicode character" v1.log | head -20 || true
          fi

      - name: Generate release tag
        id: tag
        run: |
          DATE="$(date -u +%Y-%m-%d)"
          TAG="v$(date -u +%Y.%m.%d)-$(echo ${GITHUB_SHA} | cut -c1-7)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

      - name: Name the released PDF manuscript.{date}.pdf
        run: cp article/drafts/v1.pdf "article/drafts/manuscript.${{ steps.tag.outputs.date }}.pdf"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Manuscript PDF — ${{ steps.tag.outputs.date }}"
          body: |
            Compiled PDF of *Cancer Therapy Mechanisms and Evidence: A Cross-Literature Synthesis* — an evidence-led consolidation of the cancer-therapy literature (4,830 full-text articles across 19 mechanisms and 22 cancer types) paired with multi-scale simulations that test specific mechanistic claims.

            Released as `manuscript.${{ steps.tag.outputs.date }}.pdf`, built from commit ${{ github.sha }}.

            **Changes in this release:**
            ${{ github.event.head_commit.message }}
          files: article/drafts/manuscript.${{ steps.tag.outputs.date }}.pdf
          draft: false
          prerelease: false
