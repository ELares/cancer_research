name: Build & Release PDF

on:
  push:
    branches: [main]
    paths:
      - 'article/**'
      - 'scripts/generate_latex.py'
      - '.github/workflows/release-pdf.yml'

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: false  # LFS files (books/) not needed for PDF compilation

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-science \
            texlive-bibtex-extra \
            biber \
            latexmk

      - name: Generate LaTeX from Markdown
        run: python3 scripts/generate_latex.py

      - name: Compile PDF (pdflatex, 2-pass)
        working-directory: article/drafts
        run: |
          pdflatex -interaction=nonstopmode v1.tex
          pdflatex -interaction=nonstopmode v1.tex

      - name: Verify PDF was generated
        run: |
          if [ ! -f article/drafts/v1.pdf ]; then
            echo "ERROR: PDF not generated"
            exit 1
          fi
          echo "PDF size: $(du -h article/drafts/v1.pdf | cut -f1)"
          echo "PDF pages: $(pdfinfo article/drafts/v1.pdf 2>/dev/null | grep Pages || echo 'unknown')"

      - name: Generate release tag
        id: tag
        run: |
          DATE="$(date -u +%Y-%m-%d)"
          TAG="v$(date -u +%Y.%m.%d)-$(echo ${GITHUB_SHA} | cut -c1-7)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

      - name: Name the released PDF manuscript.{date}.pdf
        run: cp article/drafts/v1.pdf "article/drafts/manuscript.${{ steps.tag.outputs.date }}.pdf"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Manuscript PDF — ${{ steps.tag.outputs.date }}"
          body: |
            Compiled PDF of *Cancer Therapy Mechanisms and Evidence: A Cross-Literature Synthesis* — an evidence-led consolidation of the cancer-therapy literature (4,830 full-text articles across 19 mechanisms and 22 cancer types) paired with multi-scale simulations that test specific mechanistic claims.

            Released as `manuscript.${{ steps.tag.outputs.date }}.pdf`, built from commit ${{ github.sha }}.

            **Changes in this release:**
            ${{ github.event.head_commit.message }}
          files: article/drafts/manuscript.${{ steps.tag.outputs.date }}.pdf
          draft: false
          prerelease: false
