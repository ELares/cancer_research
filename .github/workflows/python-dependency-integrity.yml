name: Python Dependency Integrity

on:
  push:
    branches: [main]
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - 'requirements-lock.txt'
      - 'requirements-dashboard.txt'
      - 'Makefile'
      - 'Dockerfile'
      - '.github/actions/setup-python-env/action.yml'
      - '.github/workflows/python-dependency-integrity.yml'
  pull_request:
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - 'requirements-lock.txt'
      - 'requirements-dashboard.txt'
      - 'Makefile'
      - 'Dockerfile'
      - '.github/actions/setup-python-env/action.yml'
      - '.github/workflows/python-dependency-integrity.yml'

permissions:
  contents: read

jobs:
  lock-and-export-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          lfs: false
          fetch-depth: 1

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: '0.11.26'

      - name: Verify uv.lock matches pyproject.toml
        run: uv lock --check

      - name: Regenerate requirements exports and verify they are current
        run: |
          make export-python
          if ! git diff --exit-code -- requirements-lock.txt requirements-dashboard.txt; then
            echo "::error::Generated requirements exports are stale. Run: make export-python && git add requirements-lock.txt requirements-dashboard.txt"
            exit 1
          fi
